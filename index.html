<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Superficial tension — eye gaze</title>
    <link rel="stylesheet" href="./css/eye-gaze.css" />
  </head>
  <body>
    <main class="page page--full">
      <section
        id="eyeGazeRoot"
        class="eye-gaze-root"
        aria-label="Interactive gaze"
      >
        <div
          id="eyeGazeIntro"
          class="eye-gaze-intro"
          data-eye-gaze-intro
          role="dialog"
          aria-labelledby="eyeGazeIntroTitle"
        >
          <div class="eye-gaze-intro__copy">
            <p
              id="eyeGazeIntroTitle"
              class="eye-gaze-intro__text"
            >
              A tribute to Rafael Lozano-Hemmer’s
              <span lang="es">Tensión Superficial</span> (Superficial Tension).
            </p>
          </div>
          <p
            id="eyeGazeIntroHint"
            class="eye-gaze-intro__hint"
            data-eye-gaze-hint
          >
            Loading interaction. The tickling point unlocks at 100%.
          </p>
          <button
            type="button"
            class="eye-gaze-intro__start"
            data-eye-gaze-start
            aria-describedby="eyeGazeIntroTitle eyeGazeIntroHint"
            disabled
          >
            <span class="eye-gaze-intro__mark" aria-hidden="true"></span>
            <span
              class="eye-gaze-intro__mark-state"
              data-eye-gaze-mark-state
            >
              Loading
            </span>
            <span class="visually-hidden">Start — enter fullscreen</span>
          </button>
          <div class="eye-gaze-intro__progress-wrap">
            <div
              class="eye-gaze-intro__progress"
              role="progressbar"
              aria-valuemin="0"
              aria-valuemax="100"
              aria-valuenow="0"
              aria-labelledby="eyeGazeIntroHint"
              data-eye-gaze-progress
            >
              <span
                class="eye-gaze-intro__progress-bar"
                data-eye-gaze-progress-bar
              ></span>
            </div>
            <p
              class="eye-gaze-intro__progress-copy"
              data-eye-gaze-progress-copy
            >
              Loading gaze frames... 0%
            </p>
          </div>
          <p class="eye-gaze-intro__footer">
            Use the cursor to interact with the person’s face. She will follow
            you.<br />
            The view will go full screen once loading completes.
          </p>
        </div>
        <canvas
          class="eye-gaze-canvas"
          data-eye-gaze-canvas
          width="800"
          height="500"
        ></canvas>
      </section>
    </main>
    <!-- Bump ?v= when app.js behavior changes (avoids stale cached ES modules). -->
    <script type="module" src="./js/app.js?v=intro-loading-progress"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Superficial tension — eye gaze</title>
    <link rel="stylesheet" href="./css/eye-gaze.css" />
  </head>
  <body>
    <main class="page page--full">
      <section
        id="eyeGazeRoot"
        class="eye-gaze-root"
        aria-label="Interactive gaze"
      >
        <div
          id="eyeGazeIntro"
          class="eye-gaze-intro"
          data-eye-gaze-intro
          role="dialog"
          aria-labelledby="eyeGazeIntroTitle"
        >
          <div class="eye-gaze-intro__copy">
            <p
              id="eyeGazeIntroTitle"
              class="eye-gaze-intro__text"
            >
              A tribute to Rafael Lozano-Hemmer’s
              <span lang="es">Tensión Superficial</span> (Superficial Tension).
            </p>
          </div>
          <p
            id="eyeGazeIntroHint"
            class="eye-gaze-intro__hint"
          >
            Click the tickling point to start
          </p>
          <button
            type="button"
            class="eye-gaze-intro__start"
            data-eye-gaze-start
            aria-describedby="eyeGazeIntroTitle eyeGazeIntroHint"
          >
            <span class="eye-gaze-intro__mark" aria-hidden="true"></span>
            <span class="visually-hidden">Start — enter fullscreen</span>
          </button>
          <p class="eye-gaze-intro__footer">
            Use the cursor to interact with the person’s face. She will follow
            you.<br />
            The view will go full screen.
          </p>
        </div>
        <canvas
          class="eye-gaze-canvas"
          data-eye-gaze-canvas
          width="800"
          height="500"
        ></canvas>
      </section>
    </main>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
